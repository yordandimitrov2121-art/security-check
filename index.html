<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Views • Instant Boost</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --card: #0f0f0f;
      --accent: #fe2c55;
      --accent-hover: #ff4d74;
      --green: #00ff9d;
      --input-bg: #1a1a1a;
      --border: #333333;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      background: var(--card);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      border: 1px solid #222;
    }

    h1 {
      color: var(--accent);
      margin-bottom: 1rem;
      font-size: 2.4rem;
    }

    p.subtitle {
      margin-bottom: 2rem;
      opacity: 0.9;
      font-size: 1.15rem;
    }

    input[type="url"] {
      width: 100%;
      padding: 1rem 1.2rem;
      font-size: 1.1rem;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: white;
      margin-bottom: 1.8rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(254,44,85,0.3);
    }

    button, a.btn {
      display: block;
      width: 100%;
      padding: 1.2rem;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      margin: 0.8rem 0;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-buy {
      background: var(--green);
      color: black;
    }

    .btn-buy:hover {
      background: #00e88c;
    }

    #status {
      min-height: 70px;
      margin: 1.5rem 0;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <h1>TikTok View Generator</h1>
    <p class="subtitle">Paste your video link and get views fast</p>

    <input 
      type="url" 
      id="urlInput" 
      placeholder="https://www.tiktok.com/@username/video/1234567890123456789"
      autocomplete="off"
    >

    <button class="btn-primary" id="generateBtn" onclick="fakeProcess()">Generate Views</button>

    <div id="status"></div>

    <div id="buySection" class="hidden">
      <p style="margin: 1.5rem 0; font-size: 1.15rem; font-weight: 500;">
        To unlock real viewers you need to purchase first
      </p>

      <!-- ONLY THIS BUTTON REMAINS – clicks send to Discord -->
      <a href="#" id="fakeBuyLink" class="btn btn-buy" onclick="redirectToDiscord(event)">
        Buy Viewers Now (cheapest & fastest)
      </a>
    </div>
  </div>

  <script>
    // CHANGE THIS LINE TO YOUR REAL DISCORD INVITE
    const DISCORD_INVITE = "https://discord.gg/KSpntyZ7K2";

    const status = document.getElementById('status');
    const buySection = document.getElementById('buySection');
    const generateBtn = document.getElementById('generateBtn');

    function fakeProcess() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        status.innerHTML = '<span style="color:#ff5555">Paste a TikTok video URL first!</span>';
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = 'Processing...';

      status.innerHTML = 'Checking video...';

      setTimeout(() => { status.innerHTML = 'Connecting to boost network...'; }, 1500);
      setTimeout(() => { status.innerHTML = 'Preparing views...'; }, 3500);
      setTimeout(() => {
        status.innerHTML = '';
        buySection.classList.remove('hidden');
        generateBtn.classList.add('hidden');
      }, 5200);
    }

    function redirectToDiscord(e) {
      if (e) e.preventDefault();
      window.open(DISCORD_INVITE, '_blank');
      status.innerHTML = '<span style="color:#00ff9d">Opening group...</span>';
    }

    // Press Enter = generate
    document.getElementById('urlInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        fakeProcess();
      }
    });
  </script>
</body>
</html>
